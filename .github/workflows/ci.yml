name: CI Pipeline

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"

jobs:
  backend-test:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest

    # Run a test Postgres database with PostGIS and Redis
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: resq
          POSTGRES_PASSWORD: resq
          POSTGRES_DB: resq_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: ./backend/go.sum

    - name: Install dependencies
      run: go mod download

    - name: Install Goose (Migrations)
      run: go install github.com/pressly/goose/v3/cmd/goose@latest

    - name: Run Migrations
      run: goose -dir sql/migrations postgres "postgres://resq:resq@localhost:5432/resq_dev?sslmode=disable" up

    - name: Run Go Format & Vet
      run: |
        go fmt ./...
        go vet ./...

    - name: Run Tests
      run: go test -v -race ./...

  frontend-test:
    name: Frontend Lint & Typecheck (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run ESLint
      run: bun run lint

    - name: Run TypeScript Typecheck
      run: bun run typecheck
