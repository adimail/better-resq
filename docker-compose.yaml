services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=resq
      - POSTGRES_PASSWORD=resq
      - POSTGRES_DB=resq_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resq -d resq_dev"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - GIN_MODE=release
      - DATABASE_URL=postgres://resq:resq@postgres:5432/resq_dev?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super-secret-production-key-must-be-changed
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  citizen-pwa:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - APP_NAME=citizen-pwa
        - VITE_API_BASE_URL=http://localhost:8080/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin-portal:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - APP_NAME=admin-portal
        - VITE_API_BASE_URL=http://localhost:8080/v1
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

